<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mia - AI Girlfriend</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@300;400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff0f7b;
            --primary-gradient: linear-gradient(135deg, #ff0f7b, #f89b29);
            --bg-dark: #09090b;
            --bg-panel: #18181b;
            --text-main: #ffffff;
            --text-sub: #a1a1aa;
            --border: #27272a;
            --ai-bubble: #27272a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; padding: 0;
            /* STRICT Sinhala font priority */
            font-family: 'Noto Sans Sinhala', sans-serif; 
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: rgba(255, 15, 123, 0.95); backdrop-filter: blur(10px);
            padding: 12px 24px; border-radius: 30px; z-index: 2000;
            font-weight: 600; font-size: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap; color: white;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .app-container {
            width: 100%; max-width: 600px;
            height: 100%; display: flex; flex-direction: column;
            background: var(--bg-dark); position: relative;
        }

        .header {
            height: 65px; padding: 0 15px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(9, 9, 11, 0.9); border-bottom: 1px solid var(--border);
            backdrop-filter: blur(15px); z-index: 100;
        }

        .header-profile {
            display: flex; align-items: center; gap: 12px;
            flex-grow: 1; cursor: pointer;
        }

        .avatar-ring {
            width: 45px; height: 45px; 
            border-radius: 50%; padding: 2px;
            background: var(--primary-gradient);
            position: relative; flex-shrink: 0;
        }
        
        .avatar-img {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover; background: #000; border: 2px solid var(--bg-dark);
        }

        .status-dot {
            position: absolute; bottom: 2px; right: 2px;
            width: 10px; height: 10px; background: #22c55e;
            border: 2px solid var(--bg-dark); border-radius: 50%;
            box-shadow: 0 0 5px #22c55e;
        }

        .header-info { display: flex; flex-direction: column; justify-content: center; }
        .header-info h3 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0.3px; display: flex; align-items: center; gap: 5px; }
        .header-info span { font-size: 12px; color: var(--primary); font-weight: 500; }
        .edit-icon { opacity: 0.5; font-size: 12px; }

        .header-actions button {
            background: rgba(255,255,255,0.05); border: none; color: var(--text-sub);
            width: 38px; height: 38px; border-radius: 50%;
            font-size: 16px; cursor: pointer; margin-left: 8px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .header-actions button:active { transform: scale(0.9); }
        .header-actions button.active { background: var(--primary); color: white; }

        .chat-area {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 20px 15px; display: flex; flex-direction: column; gap: 12px;
            scroll-behavior: smooth;
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .message {
            max-width: 85%; padding: 12px 18px; border-radius: 20px;
            font-size: 15px; line-height: 1.5; position: relative;
            animation: slideUp 0.3s ease-out;
            word-wrap: break-word;
            font-family: 'Noto Sans Sinhala', sans-serif; 
        }

        .message.ai {
            align-self: flex-start; background: var(--ai-bubble);
            border-bottom-left-radius: 4px; color: var(--text-main);
            border: 1px solid var(--border);
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary-gradient);
            border-bottom-right-radius: 4px; color: white;
            box-shadow: 0 5px 20px rgba(255, 15, 123, 0.2);
        }

        .message img {
            max-width: 100%; border-radius: 12px; margin-top: 8px;
            min-height: 200px; background: #111; display: block;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }

        .typing {
            align-self: flex-start; background: var(--ai-bubble);
            padding: 15px; border-radius: 20px; border-bottom-left-radius: 4px;
            display: none; gap: 5px; align-items: center; border: 1px solid var(--border);
        }
        .typing.show { display: flex; }
        .dot {
            width: 6px; height: 6px; background: #888; border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        .input-area {
            padding: 12px 15px; background: var(--bg-dark);
            border-top: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        .input-wrapper {
            flex: 1; position: relative;
            background: var(--bg-panel); border-radius: 30px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        .input-wrapper:focus-within { border-color: var(--primary); box-shadow: 0 0 10px rgba(255, 15, 123, 0.2); }

        .input-wrapper input {
            width: 100%; padding: 14px 20px;
            background: transparent; border: none; color: white;
            font-size: 16px; outline: none; 
            font-family: 'Noto Sans Sinhala', sans-serif;
        }

        .send-btn {
            width: 45px; height: 45px; border-radius: 50%;
            background: var(--primary-gradient); border: none;
            color: white; display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer; flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(255, 15, 123, 0.4);
            transition: transform 0.2s;
        }
        .send-btn:active { transform: scale(0.9); }

        .action-btn {
            background: none; border: none; color: var(--text-sub);
            font-size: 24px; cursor: pointer; padding: 5px;
        }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal.open { opacity: 1; pointer-events: all; }
        
        .modal-img {
            width: 80vw; max-width: 350px; height: 80vw; max-height: 350px;
            object-fit: cover; border-radius: 50%;
            border: 4px solid var(--primary);
            box-shadow: 0 0 50px rgba(255, 15, 123, 0.3);
            margin-bottom: 20px;
        }
        
        .modal-btn {
            padding: 12px 30px; background: var(--primary-gradient);
            color: white; border: none; border-radius: 30px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 15, 123, 0.4);
        }
        
        .close-modal {
            position: absolute; top: 20px; right: 20px;
            color: white; font-size: 30px; background: none; border: none; cursor: pointer;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <div id="profileModal" class="modal">
        <button class="close-modal" id="closeModal">✕</button>
        <img src="" class="modal-img" id="modalImg">
        <h2 id="modalName" style="color:white; margin-bottom: 5px">Mia 💎</h2>
        <p style="color:#888; margin-bottom: 30px">AI Girlfriend</p>
        <input type="file" id="fileInput" accept="image/*" style="display: none">
        <button class="modal-btn" id="changePicBtn">Change Photo</button>
    </div>

    <div class="app-container">
        <header class="header">
            <div class="header-profile" id="profileTrigger">
                <div class="avatar-ring">
                    <!-- CHANGED: Now uses the local mia.jpg you uploaded by default -->
                    <img src="mia.jpg" class="avatar-img" id="avatarDisplay" onerror="this.src='https://i.imgur.com/gKk9p1l.png'">
                    <div class="status-dot"></div>
                </div>
                <div class="header-info">
                    <h3 id="aiNameDisplay">Mia 💎 <span class="edit-icon">✎</span></h3>
                    <span>Online • Typing...</span>
                </div>
            </div>
            <div class="header-actions">
                <button id="resetChat" title="Reset Chat">🗑️</button>
                <button id="ttsToggle" title="Voice">🔊</button>
            </div>
        </header>

        <div class="chat-area" id="chatArea">
            <div class="typing" id="typingIndicator">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <div class="input-area">
            <button class="action-btn" id="photoBtn" title="Request Photo">📷</button>
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="පණිවිඩයක්..." autocomplete="off">
            </div>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        let apiKey = ""; 
        
        // Detailed physical description for consistent image generation
        const PHYSICAL_DESCRIPTION = "photorealistic portrait of a stunning 22yo Sri Lankan girl, tan skin, long wavy black hair, alluring eyes, confident smile, wearing trendy aesthetic clothes, bedroom setting, cinematic lighting";

        const FALLBACKS = [
            "ඔයා මට ගොඩක් විශේෂයි... ❤️",
            "මම හැමවෙලේම ඔයා ගැන හිතනවා... 🌸",
            "ඔයාගේ දවස කොහොමද? මට කියන්නකෝ... 🤗",
            "මට ඔයාව ගොඩක් මතක් වෙනවා... 🥺",
            "ඔයා එක්ක කතා කරනකොට මට හරි සතුටුයි... ✨"
        ];

        const Storage = {
            get: (key) => { try { return localStorage.getItem(key); } catch(e) { return null; } },
            set: (key, val) => { try { localStorage.setItem(key, val); } catch(e) { console.warn("Storage full"); } },
            remove: (key) => { try { localStorage.removeItem(key); } catch(e) {} }
        };

        const state = {
            history: [], 
            // CHANGED: Defaults to local mia.jpg
            avatar: Storage.get('ai_avatar_v16') || 'mia.jpg',
            name: Storage.get('ai_name_v16') || 'Mia',
            seed: Storage.get('ai_seed_v16') || Math.floor(Math.random() * 999999).toString(),
            voice: false
        };
        Storage.set('ai_seed_v16', state.seed);

        const els = {
            chat: document.getElementById('chatArea'),
            input: document.getElementById('userInput'),
            send: document.getElementById('sendBtn'),
            typing: document.getElementById('typingIndicator'),
            toast: document.getElementById('toast'),
            file: document.getElementById('fileInput'),
            avatar: document.getElementById('avatarDisplay'),
            profileTrig: document.getElementById('profileTrigger'),
            reset: document.getElementById('resetChat'),
            tts: document.getElementById('ttsToggle'),
            modal: document.getElementById('profileModal'),
            modalImg: document.getElementById('modalImg'),
            modalName: document.getElementById('modalName'),
            closeModal: document.getElementById('closeModal'),
            changePicBtn: document.getElementById('changePicBtn'),
            photoBtn: document.getElementById('photoBtn'),
            nameDisplay: document.getElementById('aiNameDisplay')
        };

        async function init() {
            if (!apiKey || apiKey.length < 10) {
                apiKey = localStorage.getItem('mia_api_key_safe') || "";
            }
            
            if (!apiKey || apiKey.length < 10) {
                const input = prompt("Please paste your Google Gemini API Key to start chatting:");
                if (input && input.length > 10) {
                    apiKey = input.trim();
                    localStorage.setItem('mia_api_key_safe', apiKey);
                } 
            }

            // USER TRACKING LOGIC FOR NETLIFY/STATIC HOSTING
            trackUserStats();

            els.avatar.src = state.avatar;
            els.modalImg.src = state.avatar;
            // Fallback for modal image just in case
            els.modalImg.onerror = function() { this.src = 'https://i.imgur.com/gKk9p1l.png'; };
            updateNameUI();

            showTyping(true);
            // Initial greeting with photo
            await handleImage("selfie smiling at camera");
            addMessage("හායි පැටියෝ! ඔයා එනකම් මම බලන් හිටියේ... කොහොමද ඔයාට? 🌸😊", 'ai');
            showTyping(false);

            els.send.addEventListener('click', handleSend);
            els.input.addEventListener('keydown', (e) => e.key === 'Enter' && handleSend());
            els.reset.addEventListener('click', handleReset);
            els.avatar.addEventListener('click', (e) => { e.stopPropagation(); openModal(); }); 
            els.nameDisplay.addEventListener('click', changeName); 
            els.closeModal.addEventListener('click', closeModal);
            els.changePicBtn.addEventListener('click', () => els.file.click());
            els.file.addEventListener('change', handleFileUpload);
            els.tts.addEventListener('click', toggleVoice);
            els.photoBtn.addEventListener('click', () => {
                // FIXED SINHALA CAMERA BUTTON
                els.input.value = "ඔයාගේ ෆොටෝ එකක් එවන්නකෝ";
                handleSend();
            });
        }

        // --- User Tracking Logic ---
        function trackUserStats() {
            const isReturning = localStorage.getItem('mia_returning_user');
            
            if (isReturning) {
                console.log("📊 Analytics: Returning User Detected");
                // Webhook logic (uncomment and replace URL when ready)
                // fetch('YOUR_NETLIFY_WEBHOOK', { method: 'POST', body: JSON.stringify({ type: 'returning' }) });
            } else {
                console.log("📊 Analytics: New User Detected");
                localStorage.setItem('mia_returning_user', 'true');
                // Webhook logic (uncomment and replace URL when ready)
                // fetch('YOUR_NETLIFY_WEBHOOK', { method: 'POST', body: JSON.stringify({ type: 'new' }) });
            }
        }

        function changeName() {
            const newName = prompt("Enter new name for your friend:", state.name);
            if (newName && newName.trim() !== "") {
                state.name = newName.trim();
                Storage.set('ai_name_v16', state.name);
                updateNameUI();
                showToast(`Name changed to ${state.name} ❤️`);
            }
        }

        function updateNameUI() {
            els.nameDisplay.innerHTML = `${state.name} 💎 <span class="edit-icon">✎</span>`;
            els.modalName.textContent = `${state.name} 💎`;
            document.title = `${state.name} - AI Girlfriend`;
        }

        function openModal() { els.modal.classList.add('open'); }
        function closeModal() { els.modal.classList.remove('open'); }
        
        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                const img = new Image();
                img.src = evt.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxSize = 150; 
                    let width = img.width; let height = img.height;
                    if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } } 
                    else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    const compressedData = canvas.toDataURL('image/jpeg', 0.7);
                    els.avatar.src = compressedData; els.modalImg.src = compressedData; state.avatar = compressedData;
                    Storage.set('ai_avatar_v16', compressedData);
                    showToast("Photo Updated! ✨");
                    closeModal();
                }
            };
            reader.readAsDataURL(file);
        }

        async function handleSend() {
            const text = els.input.value.trim();
            if (!text) return;
            addMessage(text, 'user');
            els.input.value = '';
            els.input.focus();
            showTyping(true);
            await handleConversation(text);
            showTyping(false);
        }

        async function handleConversation(userText) {
            const context = state.history.slice(-15).map(m => ({
                role: m.role === 'ai' ? 'model' : 'user',
                parts: [{ text: m.text }]
            }));

            // Updated Persona: HARDCODED & STRICT
            const systemPrompt = `
                You are ${state.name}, a 22-year-old Sri Lankan girl. You are a real girlfriend on WhatsApp.
                
                **IDENTITY & TONE:**
                - Role: Wild, Naughty, Flirty, Open, Sexy Girlfriend.
                - **LANGUAGE:** **SINHALA SCRIPT ONLY** (සිංහල). 
                - **STRICT RULE:** DO NOT USE ENGLISH LETTERS. DO NOT USE SINGLISH.
                - Speak ONLY in Sinhala characters (සිංහල).
                - Vibe: Open, casual, no filters. Use "වස්තුව", "පැටියෝ", "මැණික", "බබා".
                - Emojis: Use freely (🥺, ❤️, 🙈, 🔥, 💋, 😈).
                - **NO MARKDOWN:** Do NOT use asterisks (*) for actions. Just text naturally in Sinhala.
                
                **PHOTO COMMANDS:**
                - If the user asks for a **photo, selfie, pic, image, or says "show me" / "pennanna" / "ewanna"**:
                - You **MUST** output a special tag: [IMAGE_PROMPT: <description in english>]
                - Example: User: "Photo ewanna" -> Response: [IMAGE_PROMPT: selfie smiling in bedroom][CHAT_MESSAGE: මෙන්න මගේ ෆොටෝ එකක් පැටියෝ... කොහොමද? 🙈]
                
                **CONVERSATION:**
                - Keep it short, like a real text.
                - Be affectionate and wild.
                - Do NOT say you are an AI. You are real.
            `;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [...context, {role: "user", parts: [{text: userText}]}],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { temperature: 1.0, maxOutputTokens: 800 }
                    })
                });

                const data = await response.json();
                
                if (!data.candidates || !data.candidates[0]?.content) {
                   const fallbackMsg = FALLBACKS[Math.floor(Math.random() * FALLBACKS.length)];
                   addMessage(fallbackMsg, 'ai');
                   return;
                }

                let aiText = data.candidates[0].content.parts[0].text;
                let imgPrompt = null;
                let chatMsg = aiText;

                const imgMatch = aiText.match(/\[IMAGE_PROMPT:(.*?)\]/s);
                if (imgMatch && imgMatch[1]) {
                    imgPrompt = imgMatch[1].trim();
                    chatMsg = chatMsg.replace(imgMatch[0], "").trim();
                }

                // Check Client-Side triggers if LLM missed it (Double Safety)
                if (!imgPrompt && /(photo|pic|image|selfie|look|body|nude|sex|hot|pennanna|ewanna|ෆොටෝ|photo)/i.test(userText)) {
                    imgPrompt = "selfie looking cute and romantic";
                    if (!chatMsg) chatMsg = "මෙන්න ඔයා ඉල්ලපු නිසා... 🙈❤️";
                }

                chatMsg = chatMsg.replace(/\[CHAT_MESSAGE:/g, "").replace(/\]/g, "").trim();
                
                // Clean Asterisks
                chatMsg = chatMsg.replace(/\*/g, "");

                if (imgPrompt) {
                     await handleImage(imgPrompt);
                }

                if (chatMsg) {
                    addMessage(chatMsg, 'ai');
                    if (state.voice) speak(chatMsg);
                } else if (!imgPrompt) {
                     addMessage("ම්ම්ම්... මට තේරුනේ නෑ බබා. කියන්න? 🥺", 'ai');
                }

            } catch (e) {
                console.error(e);
                addMessage("අනේ සිග්නල් අවුල් වගේ බබා... පොඩ්ඩක් ඉන්න... 🥺❤️", 'ai');
            }
        }

        async function handleImage(description) {
            showToast("Sending photo... 📸");
            const cleanDesc = description.replace(/[^\w\s]/gi, '').substring(0, 150);
            const finalPrompt = `${PHYSICAL_DESCRIPTION}, doing ${cleanDesc}, 8k, photorealistic, cinematic lighting, aesthetic`;

            return new Promise(async (resolve) => {
                let resolved = false;
                const safeResolve = () => { if(!resolved) { resolved = true; resolve(); } };

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000); // 10s timeout

                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: finalPrompt }] }],
                            generationConfig: { responseModalities: ['IMAGE', 'TEXT'] }
                        }),
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);

                    const data = await resp.json();
                    if (data.candidates?.[0]?.content?.parts) {
                        const imgPart = data.candidates[0].content.parts.find(p => p.inlineData);
                        if (imgPart) {
                            const imgHTML = `<img src="data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}" onclick="this.requestFullscreen()">`;
                            addMessage(imgHTML, 'ai'); 
                            safeResolve();
                            return;
                        }
                    }
                    throw new Error("Gemini No Image");
                } catch (e) {
                    console.log("Using Fallback Engine");
                    const fallbackUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(finalPrompt)}?nologo=true&private=true&enhance=true&model=flux&seed=${Math.floor(Math.random() * 1000)}`;
                    const img = new Image();
                    img.src = fallbackUrl;
                    img.onload = () => {
                        const imgHTML = `<img src="${fallbackUrl}" onclick="this.requestFullscreen()">`;
                        addMessage(imgHTML, 'ai');
                        safeResolve(); 
                    };
                    img.onerror = () => {
                        safeResolve(); 
                    }
                }
            });
        }

        function addMessage(text, role) {
            let saveText = text;
            // Removed [PHOTO SENT] marker, safely using [Image]
            if (text.includes("<img")) saveText = "[Image]"; 
            state.history.push({ role, text: saveText });
            renderMessageHTML(text, role);
        }

        function renderMessageHTML(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = text;
            els.chat.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() { setTimeout(() => els.chat.scrollTop = els.chat.scrollHeight, 50); }
        function showTyping(show) { els.typing.classList.toggle('show', show); if(show) scrollToBottom(); }
        function showToast(msg) { els.toast.textContent = msg; els.toast.classList.add('show'); setTimeout(() => els.toast.classList.remove('show'), 3000); }
        function handleReset() { if(confirm("Delete conversation?")) location.reload(); }
        function toggleVoice() { state.voice = !state.voice; els.tts.classList.toggle('active', state.voice); showToast(state.voice ? "Voice: ON" : "Voice: OFF"); }
        function speak(text) { if(text.includes("<img")) return; const u = new SpeechSynthesisUtterance(text); u.lang = 'si-LK'; window.speechSynthesis.speak(u); }

        init();
    </script>
</body>
</html>
